services:
  db:
    build:
      context: .
      dockerfile: docker/db.Dockerfile
    image: person-intelligence-search-postgres:local
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-persondb}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-persondb}
      POSTGRES_DB: ${POSTGRES_DB:-persondb}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-persondb} -d ${POSTGRES_DB:-persondb}"]
      interval: 3s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  api:
    build: .
    image: person-intelligence-search:local
    environment: &app_env
      HOST: 0.0.0.0
      PORT: 3000
      STORE_PROVIDER: postgres
      DATABASE_URL: postgres://${POSTGRES_USER:-persondb}:${POSTGRES_PASSWORD:-persondb}@db:5432/${POSTGRES_DB:-persondb}
      PGROONGA_ENABLED: ${PGROONGA_ENABLED:-true}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-256}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-}
      LLM_MODEL: ${LLM_MODEL:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      API_KEY: ${API_KEY:-}
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-26214400}
      DEFAULT_LANGUAGE: ${DEFAULT_LANGUAGE:-ja}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-2}
      UNSTRUCTURED_API_URL: ${UNSTRUCTURED_API_URL:-http://unstructured:8000/general/v0/general}
      UNSTRUCTURED_API_KEY: ${UNSTRUCTURED_API_KEY:-}
      UNSTRUCTURED_STRATEGY: ${UNSTRUCTURED_STRATEGY:-auto}
      UNSTRUCTURED_LANGUAGES: ${UNSTRUCTURED_LANGUAGES:-}
      UNSTRUCTURED_TIMEOUT_MS: ${UNSTRUCTURED_TIMEOUT_MS:-120000}
    ports:
      - "${PORT:-3000}:3000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  worker:
    image: person-intelligence-search:local
    build: .
    command: ["node", "apps/worker/server.ts"]
    environment: *app_env
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  unstructured:
    image: downloads.unstructured.io/unstructured-io/unstructured-api:latest
    profiles: ["documents"]
    ports:
      - "${UNSTRUCTURED_PORT:-8000}:8000"
    restart: unless-stopped

volumes:
  db_data:
